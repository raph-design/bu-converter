<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bu Converter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f0e8;
      color: #2c2c2c;
      min-height: 100vh;
      padding: 40px 24px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 4px;
      text-align:center;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 24px;
      text-align: center;
    }

    /* Toggle */
    .toggle {
      display: flex;
      background: #e8e0d0;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      width: 100%;
    }

    .toggle button {
      flex: 1;
      background: transparent;
      color: #888;
      border: none;
      border-radius: 9px;
      padding: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .toggle button.active {
      background: white;
      color: #2c2c2c;
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .view {
      display: none;
    }

    .view.visible {
      display: block;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .card h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #5c4a2a;
    }

    button {
      background: #5c4a2a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button:active {
      opacity: 0.8;
    }

    .result {
      background: #f5f0e8;
      border-radius: 10px;
      padding: 16px;
      display: none;
    }

    .result.visible {
      display: block;
    }

    .result-main {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .result-error {
      font-size: 0.9rem;
      color: #888;
    }

    .fraction-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    select {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 1.1rem;
      background: white;
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid #e0d8cc;
      color: #888;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0ece4;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #faf7f2;
    }

    tr.highlight {
      font-weight: 700;
      background: #fef9ec;
    }

    tr.highlight:hover {
      background: #fdf3d4;
    }

    .highlight-note {
      font-size: 0.8rem;
      color: #a07840;
      margin-top: 14px;
    }
  </style>
</head>
<body>

  <h1>Bu Converter</h1>
  <p class="subtitle">Japanese bu ↔ Imperial inches</p>

  <div class="toggle">
    <button class="active" onclick="showView('calculator', this)">Calculator</button>
    <button onclick="showView('table', this)">Table</button>
  </div>

  <!-- CALCULATOR VIEW -->
  <div class="view visible" id="view-calculator">

    <div class="card">
      <h2>Bu → Inches</h2>
      <div class="input-row">
        <input type="number" id="buInput" placeholder="Enter bu" min="0" step="any" />
        <button onclick="convertBuToInches()">Convert</button>
      </div>
      <div class="result" id="buResult">
        <div class="result-main" id="buResultMain"></div>
        <div class="result-error" id="buResultError"></div>
      </div>
    </div>

    <div class="card">
      <h2>Inches → Bu</h2>
      <div class="input-row fraction-row">
        <input type="number" id="inchWhole" placeholder="Whole inches" min="0" step="1" />
        <span>and</span>
        <select id="inchFraction">
          <option value="0">0"</option>
          <option value="1">1/16"</option>
          <option value="2">1/8"</option>
          <option value="3">3/16"</option>
          <option value="4">1/4"</option>
          <option value="5">5/16"</option>
          <option value="6">3/8"</option>
          <option value="7">7/16"</option>
          <option value="8">1/2"</option>
          <option value="9">9/16"</option>
          <option value="10">5/8"</option>
          <option value="11">11/16"</option>
          <option value="12">3/4"</option>
          <option value="13">13/16"</option>
          <option value="14">7/8"</option>
          <option value="15">15/16"</option>
        </select>
        <button onclick="convertInchesToBu()">Convert</button>
      </div>
      <div class="result" id="inchResult">
        <div class="result-main" id="inchResultMain"></div>
        <div class="result-error" id="inchResultError"></div>
      </div>
    </div>

  </div>

  <!-- TABLE VIEW -->
  <div class="view" id="view-table">
    <div class="card">
      <h2>Reference Table (1–30 bu)</h2>
      <table>
        <thead>
          <tr>
            <th>Bu</th>
            <th>Nearest inch</th>
            <th>Error (")</th>
          </tr>
        </thead>
        <tbody id="referenceTableBody"></tbody>
      </table>
      <p class="highlight-note">★ Near-perfect match to 1/8" increment (error &lt; 0.006")</p>
    </div>
  </div>

  <script>
    const BU_IN_INCHES = 0.11930;
    const BU_PER_INCH = 1 / BU_IN_INCHES;

    function showView(viewName, btn) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('visible'));
      document.querySelectorAll('.toggle button').forEach(b => b.classList.remove('active'));
      document.getElementById('view-' + viewName).classList.add('visible');
      btn.classList.add('active');
    }

    function gcd(a, b) {
      return b === 0 ? a : gcd(b, a % b);
    }

    function simplifyFraction(numerator, denominator) {
      if (numerator === 0) return null;
      const divisor = gcd(numerator, denominator);
      return { num: numerator / divisor, den: denominator / divisor };
    }

    function formatInches(decimalInches) {
      const whole = Math.floor(decimalInches);
      const remainder16 = Math.round((decimalInches - whole) * 16);

      let fractionStr = '';
      if (remainder16 !== 0) {
        const simplified = simplifyFraction(remainder16, 16);
        fractionStr = `${simplified.num}/${simplified.den}"`;
      }

      if (whole > 0 && fractionStr) return `${whole} and ${fractionStr}`;
      if (whole > 0) return `${whole}"`;
      return fractionStr || '0"';
    }

    function nearestSixteenth(decimalInches) {
      return Math.round(decimalInches * 16) / 16;
    }

    function isEighthInch(decimalInches) {
      const remainder16 = Math.round((decimalInches - Math.floor(decimalInches)) * 16);
      return remainder16 % 2 === 0;
    }

    function convertBuToInches() {
      const bu = parseFloat(document.getElementById('buInput').value);
      if (isNaN(bu) || bu < 0) return;

      const exactInches = bu * BU_IN_INCHES;
      const nearest16 = nearestSixteenth(exactInches);
      const errorInches = Math.abs(exactInches - nearest16);
      const errorBu = errorInches * BU_PER_INCH;

      document.getElementById('buResultMain').textContent = formatInches(nearest16);
      document.getElementById('buResultError').textContent =
        `Margin of error: ${errorInches.toFixed(4)}" (${errorBu.toFixed(2)} bu)`;
      document.getElementById('buResult').classList.add('visible');
    }

    function convertInchesToBu() {
      const whole = parseFloat(document.getElementById('inchWhole').value) || 0;
      const fraction = parseInt(document.getElementById('inchFraction').value);

      const totalInches = whole + (fraction / 16);
      if (totalInches <= 0) return;

      const exactBu = totalInches * BU_PER_INCH;
      const roundedBu = Math.round(exactBu * 10) / 10;
      const errorBu = Math.abs(exactBu - roundedBu);
      const errorInches = errorBu * BU_IN_INCHES;

      document.getElementById('inchResultMain').textContent = `${exactBu.toFixed(2)} bu`;
      document.getElementById('inchResultError').textContent =
        `Margin of error: ${errorBu.toFixed(4)} bu (${errorInches.toFixed(4)}")`;
      document.getElementById('inchResult').classList.add('visible');
    }

    function buildTable() {
      const tbody = document.getElementById('referenceTableBody');
      const rows = [];

      for (let bu = 1; bu <= 30; bu++) {
        rows.push(bu);
        const halfBu = bu - 0.5;
        const exactInches = halfBu * BU_IN_INCHES;
        const nearest16 = nearestSixteenth(exactInches);
        const errorInches = Math.abs(exactInches - nearest16);
        if (errorInches < 0.006 && isEighthInch(nearest16)) {
          rows.push(halfBu);
        }
      }

      rows.sort((a, b) => a - b);

      rows.forEach(bu => {
        const exactInches = bu * BU_IN_INCHES;
        const nearest16 = nearestSixteenth(exactInches);
        const errorInches = Math.abs(exactInches - nearest16);
        const isNearPerfect = errorInches < 0.006 && isEighthInch(nearest16);

        const tr = document.createElement('tr');
        if (isNearPerfect) tr.classList.add('highlight');

        tr.innerHTML = `
          <td>${bu}${isNearPerfect ? ' ★' : ''}</td>
          <td>${formatInches(nearest16)}</td>
          <td>${errorInches.toFixed(2)}"</td>
        `;
        tbody.appendChild(tr);
      });
    }

    buildTable();
  </script>

</body>
</html>
